# Cluster bootstrap — apply once per cluster before app deploy:
#   kubectl apply -f k8s/infra/cluster-issuer.yaml
#
# Requires cert-manager and an nginx IngressClass named "nginx".
# Replace YOUR_EMAIL with a valid address for Let's Encrypt expiry notices.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: YOUR_EMAIL
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
