apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: audiblytics
resources:
  - ../../base
  - ingress.yaml
images:
  - name: audiblytics-api
    newName: ghcr.io/priiyank-xd/audiblytics-api
    newTag: latest
  - name: audiblytics-web
    newName: ghcr.io/priiyank-xd/audiblytics-web
    newTag: latest
patches:
  - path: configmap-patch.yaml
  - path: image-patch.yaml
