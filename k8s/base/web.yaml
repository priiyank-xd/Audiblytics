apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiblytics-web
  namespace: audiblytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiblytics-web
  template:
    metadata:
      labels:
        app: audiblytics-web
    spec:
      containers:
        - name: web
          image: audiblytics-web
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: audiblytics-web-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: audiblytics-web
  namespace: audiblytics
spec:
  type: ClusterIP
  selector:
    app: audiblytics-web
  ports:
    - port: 3000
      targetPort: 3000
