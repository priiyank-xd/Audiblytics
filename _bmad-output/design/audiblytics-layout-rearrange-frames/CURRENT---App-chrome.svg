<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" fill="none">
<defs>
    <style>
      .label { font: 600 11px Inter, system-ui, sans-serif; fill: #4a4a4a; letter-spacing: 0.06em; text-transform: uppercase; }
      .title { font: 400 28px Georgia, serif; fill: #1a1a1a; }
      .subtitle { font: 400 14px Georgia, serif; fill: #4a4a4a; }
      .body { font: 400 13px Georgia, serif; fill: #1a1a1a; }
      .ui { font: 500 13px Inter, system-ui, sans-serif; fill: #1a1a1a; }
      .mono { font: 500 12px ui-monospace, monospace; fill: #1a1a1a; }
      .caption { font: 400 11px Inter, system-ui, sans-serif; fill: #5c5751; }
      .frame-title { font: 700 16px Inter, system-ui, sans-serif; fill: #1a1a1a; }
      .chip { font: 500 11px Inter, system-ui, sans-serif; fill: #f5f0e6; }
      .note { font: 400 11px Inter, system-ui, sans-serif; fill: #8b2929; }
      .comp-tag { font: 500 10px ui-monospace, monospace; fill: #2d5b3a; }
    </style>
  </defs>
<g id="CURRENT - App chrome" transform="translate(40, 100)">
    <rect width="1440" height="960" rx="8" fill="#f5f0e6" stroke="#d9d2c5" stroke-width="2"/>
    <text class="frame-title" x="24" y="32">CURRENT - App chrome</text>
    <text class="comp-tag" x="24" y="50">layout.tsx / TopNav / MainContentShell / HonestyFooter</text>
    <rect x="24" y="64" width="1392" height="48" fill="#ebe5d6" opacity="0.5"/>
    <text class="ui" x="1280" y="94">Home</text>
    <text class="ui" x="1380" y="94" text-anchor="end" font-weight="600">Settings</text>
    <text class="comp-tag" x="24" y="94">TopNav (2 links only)</text>
    <rect x="24" y="120" width="1392" height="760" fill="#f5f0e6" stroke="#d9d2c5"/>
    <text class="label" x="40" y="148">MainContentShell</text>
    <text class="body" x="40" y="172">{route children}</text>
    <text class="note" x="40" y="196">DayRail + StatRail exist in code but are NOT in layout</text>
    <rect x="24" y="888" width="1392" height="48" stroke="#d9d2c5"/>
    <text class="mono" x="720" y="918" text-anchor="middle">HonestyFooter</text>
  </g>
</svg>