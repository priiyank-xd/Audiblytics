name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "k8s/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: priiyank-xd
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/audiblytics-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/audiblytics-api:latest

      - name: Build and push Web image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_STORAGE_BACKEND=api
            NEXT_PUBLIC_AUDIBLYTICS_PERSONAL_USE=true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/audiblytics-web:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/audiblytics-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: imranismail/setup-kustomize@v2

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Set image tags and apply manifests
        run: |
          cd k8s/overlays/production
          kustomize edit set image \
            audiblytics-api=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/audiblytics-api:${{ env.IMAGE_TAG }} \
            audiblytics-web=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/audiblytics-web:${{ env.IMAGE_TAG }}
          kubectl apply -k .

      - name: Wait for rollout
        run: |
          kubectl -n audiblytics rollout status deployment/audiblytics-api --timeout=300s
          kubectl -n audiblytics rollout status deployment/audiblytics-web --timeout=300s
